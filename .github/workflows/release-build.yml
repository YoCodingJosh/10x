# Triggered when a GitHub Release is published (see release-publish.yml / `pnpm run bump`).
#
# Required GitHub Environment secrets (e.g. environment name: "release"):
#
#   GH_TOKEN — PAT with repo + releases (or use repo default token for upload only).
#
# Optional: Windows builds are unsigned by default (verifyUpdateCodeSignature: false in package.json).
# This is a todo for a later release
#
# macOS only:
#   MAC_CERTS_P12 — base64 of Developer ID Application .p12 (export from Keychain).
#   MAC_CERTS_PASSWORD — password for that .p12.
#   APPLE_API_KEY_P8 — base64 of App Store Connect API key file (AuthKey_xxx.p8).
#   APPLE_API_KEY_ID — Key ID from App Store Connect (10 chars).
#   APPLE_API_ISSUER — Issuer ID (UUID) from App Store Connect → Keys.
#   APPLE_TEAM_ID — Apple Developer Team ID (10 chars). Required by electron-builder / notarize (not package.json).

name: Release Builds

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    environment: release
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # electron-updater: latest-mac.yml, latest-linux.yml, latest.yml (Windows) on the same release.
          - label: macOS
            os: macos-latest
            files: |
              release/*.dmg
              release/*.zip
              release/*.yml
          - label: Linux
            os: ubuntu-latest
            files: |
              release/*.AppImage
              release/*.yml
          - label: Windows
            os: windows-latest
            files: |
              release/*.exe
              release/*.yml
              release/*.blockmap

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: macOS — import Developer ID certificate (.p12)
        if: matrix.label == 'macOS'
        env:
          MAC_CERTS_P12: ${{ secrets.MAC_CERTS_P12 }}
          MAC_CERTS_PASSWORD: ${{ secrets.MAC_CERTS_PASSWORD }}
        run: |
          set -euo pipefail
          CERT="$RUNNER_TEMP/developer_id.p12"
          KEYCHAIN="$RUNNER_TEMP/signing.keychain-db"
          echo -n "$MAC_CERTS_P12" | openssl base64 -d -A -out "$CERT"
          security create-keychain -p actions "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p actions "$KEYCHAIN"
          security import "$CERT" -k "$KEYCHAIN" -P "$MAC_CERTS_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security -A
          security list-keychain -d user -s "$KEYCHAIN"
          security default-keychain -s "$KEYCHAIN"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k actions "$KEYCHAIN"
          security find-identity -v -p codesigning
          {
            echo "CSC_LINK=$CERT"
            echo "CSC_KEY_PASSWORD=$MAC_CERTS_PASSWORD"
          } >> "$GITHUB_ENV"

      - name: macOS — App Store Connect API key (notarization)
        if: matrix.label == 'macOS'
        env:
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
        run: |
          set -euo pipefail
          KEY_PATH="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY_ID}.p8"
          echo -n "$APPLE_API_KEY_P8" | openssl base64 -d -A -out "$KEY_PATH"
          chmod 600 "$KEY_PATH"
          echo "APPLE_API_KEY=$KEY_PATH" >> "$GITHUB_ENV"

      - name: Build release artifacts (Linux)
        if: matrix.label == 'Linux'
        run: pnpm run build:linux
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Build release artifacts (Windows)
        if: matrix.label == 'Windows'
        run: pnpm run build:win
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Build release artifacts (macOS)
        if: matrix.label == 'macOS'
        run: pnpm run build:mac
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.files }}
          overwrite_files: true
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
