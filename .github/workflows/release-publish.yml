# Creates the semver tag + published GitHub Release for a version bump commit.
# Triggered by: `pnpm run bump` (local), or manual "Run workflow" in the Actions tab.
# That fires `release: published` → release-build.yml uploads DMG / AppImage / Windows installer assets.
#
# Requires: GitHub CLI (`gh`) authenticated locally for dispatch from bump.js.
#
# The release MUST be created with a PAT (`GH_TOKEN`), not only `GITHUB_TOKEN`:
# GitHub does not run other workflows for events caused by the default token, so
# `release-build.yml` would never start. See:
# https://docs.github.com/en/actions/security-for-github-automatic-token-authentication#using-the-github_token-in-a-workflow

name: Publish release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Semver tag (must match package.json on the checked-out ref)
        required: true
        type: string
      release_notes:
        description: Markdown body for the GitHub Release
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: publish-release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  tag-and-release:
    name: Tag and publish GitHub Release
    runs-on: ubuntu-latest
    environment: release
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify package.json version
        env:
          EXPECTED: ${{ inputs.version }}
        run: |
          set -euo pipefail
          node --input-type=module -e "
            import { readFileSync } from 'node:fs';
            const { version } = JSON.parse(readFileSync('package.json', 'utf8'));
            if (version !== process.env.EXPECTED) {
              console.error('package.json version', JSON.stringify(version), '!== input', JSON.stringify(process.env.EXPECTED));
              process.exit(1);
            }
          "

      - name: Create tag and push
        env:
          TAG: ${{ inputs.version }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "$TAG"
          git push origin "$TAG"

      - name: Publish GitHub Release (PAT — triggers release-build)
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          RELEASE_BODY: ${{ inputs.release_notes }}
          TAG: ${{ inputs.version }}
        run: |
          set -euo pipefail
          gh release create "$TAG" \
            --title "10x $TAG" \
            --notes "$RELEASE_BODY"
